<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GRIME — Garbage River Interception and Modeling Engine</title>
<link rel="icon" type="image/png" href="https://grime.world/dashboard/images/favicon.png">
<script src="https://api.mapbox.com/mapbox-gl-js/v3.4.0/mapbox-gl.js"></script>
<link href="https://api.mapbox.com/mapbox-gl-js/v3.4.0/mapbox-gl.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root { --bg:#1E1B12; --panel: #2A2518; --card:  #352E1E; --hover: #3D3622; --bdr: #4A4330; --t:#e8e2d4; --td:  #8a7f68; --tb:    #f5f0e4; --acc:   #58B09C; --accd:  rgba(88, 176, 156, 0.15); --gen:   #f97316; --flow:  #3b82f6; --imp:   #8b5cf6; --feas:  #10b981; --mono:  'JetBrains Mono', monospace; --sans:  'DM Sans', -apple-system, sans-serif; }
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden}
body{font-family:var(--sans);background:var(--bg);color:var(--t)}

/* ── LAYOUT: header on top, sidebar+map below ── */
#app{display:flex;flex-direction:column;height:100vh;visibility:hidden}
#app.ready{visibility:visible}
#header{flex:0 0 auto;display:flex;align-items:center;justify-content:space-between;padding:10px 24px;background:var(--panel);border-bottom:1px solid var(--bdr);z-index:10}
#header h1{font-family:var(--mono);font-size:20px;font-weight:700;color:var(--tb)}
#header h1 span{color:var(--acc)}
.hm{display:flex;align-items:center;gap:12px;font-size:12px;color:var(--td);font-family:var(--mono)}
.hm button{background:rgba(255,255,255,0.08);border:1px solid var(--bdr);color:var(--td);padding:3px 10px;border-radius:6px;cursor:pointer;font-size:11px;font-family:var(--mono)}
.hm button:hover{background:rgba(255,255,255,0.15);color:var(--t)}
#content{flex:1 1 0;display:flex;min-height:0}
#sidebar{width:380px;flex:0 0 380px;background:var(--panel);border-right:1px solid var(--bdr);display:flex;flex-direction:column;overflow:hidden}
.sec{padding:14px 18px;border-bottom:1px solid var(--bdr);flex:0 0 auto}
.sec h3{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:1.2px;color:var(--td);margin-bottom:10px}
#search{width:100%;padding:9px 12px;background:var(--card);border:1px solid var(--bdr);border-radius:8px;color:var(--t);font-family:var(--sans);font-size:13px;outline:none}
#search:focus{border-color:var(--acc)}
#search::placeholder{color:var(--td)}
.stat-row{display:flex;gap:8px;margin:10px 0}
.stat{flex:1;background:var(--card);border-radius:6px;padding:8px 10px;text-align:center}
.stat-v{font-family:var(--mono);font-size:14px;font-weight:700;color:var(--acc)}
.stat-l{font-size:9px;text-transform:uppercase;letter-spacing:.8px;color:var(--td)}
#place-list{flex:1 1 0;overflow-y:auto;padding:0 18px 14px;min-height:0}
.pl-item{display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:8px;cursor:pointer;transition:all .12s;margin-bottom:2px}
.pl-item:hover{background:var(--hover)}
.pl-cc{font-size:14px;width:28px;text-align:center}
.pl-name{font-size:13px;font-weight:500;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.pl-pop{font-family:var(--mono);font-size:11px;color:var(--td)}
#back-btn{display:none;background:var(--card);border:1px solid var(--bdr);color:var(--acc);padding:6px 14px;border-radius:6px;cursor:pointer;font-size:12px;font-family:var(--mono);margin-bottom:10px}
#back-btn:hover{background:var(--hover)}
#back-btn.vis{display:inline-flex;align-items:center;gap:6px}
#city-view{display:none;flex:1 1 0;overflow-y:auto;padding:14px 18px}
#city-view.vis{display:block}
.cand-item{display:grid;grid-template-columns:32px 1fr 48px;align-items:center;gap:8px;padding:7px 10px;border-radius:8px;cursor:pointer;margin-bottom:2px}
.cand-item:hover{background:var(--hover)}
.cand-item.active{background:var(--accd)}
.rank{width:26px;height:26px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-family:var(--mono);font-weight:700;font-size:11px;background:var(--card);color:var(--td);border:1px solid var(--bdr)}
.r1{background:linear-gradient(135deg,#fbbf24,#f59e0b);color:#1a1a1a;border:none}
.r2{background:linear-gradient(135deg,#94a3b8,#64748b);color:#1a1a1a;border:none}
.r3{background:linear-gradient(135deg,#d97706,#b45309);color:#1a1a1a;border:none}
.ss-row{display:grid;grid-template-columns:85px 1fr 42px;align-items:center;gap:6px;margin-bottom:5px}
.ss-bar{height:6px;border-radius:3px;background:var(--bg);overflow:hidden}
.ss-fill{height:100%;border-radius:3px;transition:width .4s ease}
.pgrid{display:grid;grid-template-columns:1fr 1fr;gap:4px;margin-top:12px}
.pchip{background:var(--card);border:1px solid var(--bdr);border-radius:6px;padding:4px 8px}
.pchip-l{font-size:8px;text-transform:uppercase;letter-spacing:.5px;color:var(--td)}
.pchip-v{font-family:var(--mono);font-weight:600;font-size:12px;color:var(--tb)}
.close{background:var(--card);border:1px solid var(--bdr);color:var(--td);width:26px;height:26px;border-radius:6px;cursor:pointer;font-size:13px;display:flex;align-items:center;justify-content:center}
.close:hover{background:var(--hover);color:var(--t)}

/* ── MAP: fill remaining space ── */
#map-wrap{flex:1 1 0;position:relative;min-width:0}
#map{position:absolute;top:0;left:0;right:0;bottom:0}

.mapboxgl-popup-content{background:var(--panel)!important;border:1px solid var(--bdr)!important;border-radius:10px!important;padding:10px 14px!important;color:var(--t)!important;font-family:var(--sans)!important;box-shadow:0 8px 32px rgba(0,0,0,.5)!important}
.mapboxgl-popup-tip{border-top-color:var(--panel)!important}
.mapboxgl-popup-close-button{color:var(--td)!important;font-size:16px!important}
#sidebar::-webkit-scrollbar,#place-list::-webkit-scrollbar,#city-view::-webkit-scrollbar{width:5px}
#sidebar::-webkit-scrollbar-track,#place-list::-webkit-scrollbar-track,#city-view::-webkit-scrollbar-track{background:transparent}
#sidebar::-webkit-scrollbar-thumb,#place-list::-webkit-scrollbar-thumb,#city-view::-webkit-scrollbar-thumb{background:var(--bdr);border-radius:3px}
#loading{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:var(--panel);border:1px solid var(--bdr);border-radius:12px;padding:24px 40px;z-index:100;font-family:var(--mono);text-align:center}
#loading .spinner{width:28px;height:28px;border:3px solid var(--bdr);border-top-color:var(--acc);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 12px}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── Beige / light theme ── */
body.theme-light { --bg:    #F0EDE6; --panel: #FAF8F4; --card:  #E8E4DC; --hover: #DDD8CE; --bdr:   #C8C2B5; --t:     #2C2A1E; --td:    #7A7264; --tb:    #1A1810; --acc:   #2D8C7A; --accd:  rgba(45, 140, 122, 0.12); --gen:   #c2410c; --flow:  #1d4ed8; --imp:   #7e22ce; --feas:  #15803d; --mono:  'JetBrains Mono', monospace; --sans:  'DM Sans', -apple-system, sans-serif; }
body.theme-light .hm button{background:rgba(0,0,0,0.04);border-color:var(--bdr);color:var(--td)}
body.theme-light .hm button:hover{background:rgba(0,0,0,0.08);color:var(--t)}
body.theme-light .hm button.active{background:var(--accd);color:var(--acc);border-color:var(--acc)}
body.theme-light .mapboxgl-popup-content{background:var(--panel)!important;border-color:var(--bdr)!important;color:var(--t)!important}
body.theme-light .mapboxgl-popup-tip{border-top-color:var(--panel)!important}
body.theme-light #loading{background:var(--panel);border-color:var(--bdr);color:var(--t)}
body.theme-light .r1{background:linear-gradient(135deg,#d4a017,#b8860b);color:#fff}
body.theme-light .r2{background:linear-gradient(135deg,#a8a29e,#78716c);color:#fff}
body.theme-light .r3{background:linear-gradient(135deg,#b45309,#92400e);color:#fff}
.hm button.active{background:var(--accd)!important;color:var(--acc)!important;border-color:rgba(34,211,238,0.3)!important}
body.theme-light .hm button.active{border-color:var(--acc)!important}
</style>
</head>
<body class="theme-light">
<div id="loading"><div class="spinner"></div><div id="load-msg">Loading GRIME — 89,518 cities...</div></div>
<div id="app">
<div id="header">
  <h1><a href="../" style="text-decoration:none;color:inherit"><span>G</span>RIME</a></h1>
  <div class="hm">
    <span id="info">—</span>
    <button id="ww-toggle" title="Toggle OpenStreetMap waterway overlay">Waterways</button>
    <button id="style-toggle">Satellite</button>
    <button id="theme-toggle">Dark theme</button>
    <span style="color:var(--feas)">● v3</span>
  </div>
</div>
<div id="content">
  <div id="sidebar">
    <div class="sec">
      <button id="back-btn">← All cities</button>
      <h3 id="sidebar-title">Global coverage</h3>
      <input type="text" id="search" placeholder="Search cities, countries..." autocomplete="off">
      <div class="stat-row" id="stats"></div>
    </div>
    <div id="place-list"></div>
    <div id="city-view"></div>
  </div>
  <div id="map-wrap"><div id="map"></div></div>
</div>
</div>
<script>
// ═══ CONFIG — Replace with your Mapbox token ════════════════════
const API = location.origin;

// ═══ STATE ═══════════════════════════════════════════════════════
let map, places=[], activeCityIdx=-1, activeCandidates=[], activeStreams=[], selectedCand=null, isSat=false, pipelineStats=null;
 
// ═══ INIT: fetch token first, then boot everything ════════════════
async function init() {
  // Fetch token securely from backend
  let MAPBOX_TOKEN = '';
  try {
    const r = await fetch(API + '/api/config');
    if (r.ok) {
      const cfg = await r.json();
      MAPBOX_TOKEN = cfg.mapbox_token;
    }
  } catch(e) {
    console.error('Could not load config:', e);
  }
 
  if (!MAPBOX_TOKEN) {
    document.getElementById('load-msg').textContent = 'Configuration error — token missing.';
    return;
  }
 
  initMap(MAPBOX_TOKEN);
 
  // Load places and wait for map style in parallel — both must complete
  // before we can add layers
  const [placesData] = await Promise.all([
    loadPlaces(),
    new Promise(resolve => {
      if (map.isStyleLoaded()) resolve();
      else map.on('load', resolve);
    })
  ]);

  document.getElementById('load-msg').textContent = 'Loading cities database...';
  places = placesData.filter(p => p && p.n && p.c && p.la != null && p.lo != null);
  const n = places.length.toLocaleString();
  const cc = new Set(places.map(p => p.c)).size;
  document.getElementById('load-msg').textContent = `${n} cities loaded`;
  document.getElementById('search').placeholder = `Search ${n} cities across ${cc} countries...`;
  document.getElementById('loading').style.display = 'none';
  document.getElementById('app').classList.add('ready');
  map.resize();
  loadWorldView();
}
 
init();
// ═══ DATA ═══════════════════════════════════════════════════════
async function loadPlaces(){
  const paths=[API+'/mock_data/places.json','/mock_data/places.json','../../mock_data/places.json','../mock_data/places.json','mock_data/places.json'];
  for(const p of paths){try{const r=await fetch(p);if(r.ok)return await r.json()}catch(e){}}
  return[];
}

// ═══ SEEDED RANDOM (for fallback + candidate scoring) ═══════════
function seededRand(seed){
  let s=Math.abs(Math.round(seed))||1;
  return()=>{s=(s*16807)%2147483647;return(s-1)/2147483646};
}

// ═══ REAL RIVER DATA FROM OPENSTREETMAP ═════════════════════════

async function fetchRealStreams(lat,lon,pop){
  const radius=pop>1e6?8000:pop>100000?6000:4000;
  const query=`[out:json][timeout:12];(way["waterway"~"^(river|stream|canal|drain|ditch)$"]["tidal"!="yes"](around:${radius},${lat},${lon}););out geom tags;`;
  const endpoints=[
    'https://overpass-api.de/api/interpreter',
    'https://overpass.kumi.systems/api/interpreter',
    'https://maps.mail.ru/osm/tools/overpass/api/interpreter'
  ];

  let data=null;
  for(const url of endpoints){
    try{
      const ctrl=new AbortController();
      const timer=setTimeout(()=>ctrl.abort(),15000);
      const resp=await fetch(url,{method:'POST',body:'data='+encodeURIComponent(query),headers:{'Content-Type':'application/x-www-form-urlencoded'},signal:ctrl.signal});
      clearTimeout(timer);
      if(!resp.ok)throw new Error(resp.status);
      data=await resp.json();
      break;
    }catch(e){
      console.warn(`Overpass mirror ${url} failed:`,e.message);
      continue;
    }
  }
  if(!data){console.warn('All Overpass mirrors failed');return null;}

  try{
    const streams=[];
    const portalPoints=[];
    for(const el of data.elements||[]){
      if(!el.geometry||el.geometry.length<2)continue;
      const tags=el.tags||{};
      const wStr=tags.width||tags['width:mean']||'';
      const wM=parseFloat(wStr);
      if(wM&&wM>30)continue;
      const ww=tags.waterway||'stream';
      let estW=ww==='river'?20:ww==='canal'?8:ww==='stream'?3:2;
      if(wM>0)estW=wM;
      if(estW>30)continue;
      const underground=tags.tunnel==='yes'||tags.tunnel==='culvert'||tags.tunnel==='building_passage'||tags.covered==='yes'||tags.layer==='-1'||tags.layer==='-2';
      const coords=el.geometry.map(n=>[n.lon,n.lat]);
      const baseName=tags.name||({'river':'River','stream':'Creek','canal':'Canal','drain':'Drain','ditch':'Ditch'}[ww])||'Stream';
      const order=ww==='river'?4:ww==='canal'?3:ww==='stream'?2:1;
      if(underground){
        if(coords.length>=2){
          portalPoints.push({lon:coords[0][0],lat:coords[0][1],type:'entrance',stream:baseName,estWidth:estW});
          portalPoints.push({lon:coords[coords.length-1][0],lat:coords[coords.length-1][1],type:'exit',stream:baseName,estWidth:estW});
        }
        streams.push({name:baseName+' (culvert)',order,coords,estWidth:estW,waterway:ww,underground:true});
      }else{
        streams.push({name:baseName,order,coords,estWidth:estW,waterway:ww,underground:false});
      }
    }
    streams._portals=portalPoints;
    if(portalPoints.length>0)console.log(`Found ${portalPoints.length} culvert portals`);
    const surface=streams.filter(s=>!s.underground);
    if(surface.length===0&&portalPoints.length===0)throw new Error('No suitable waterways');
    streams.sort((a,b)=>(a.underground?1:0)-(b.underground?1:0)||(b.coords.length-a.coords.length));
    const maxStreams=pop>1e6?25:pop>1e5?20:15;
    return streams.slice(0,maxStreams);
  }catch(e){
    console.warn('Overpass: no waterways found or API error:',e);
    return null;
  }
}

// ═══ CANDIDATE PLACEMENT ════════════════════════════════════════
// Key insight: a net upstream already catches most debris. Placing another
// net 300m downstream on the SAME stream is wasteful — it only catches
// the ~30% that slipped through. The marginal value drops exponentially
// with each upstream net. So:
//   1. Wide spacing (500m same-stream, 300m cross-stream)
//   2. Score everything independently first
//   3. Greedy selection with upstream occlusion: each time we place a net,
//      discount all un-placed candidates downstream on the same waterway

function hvM(a1,o1,a2,o2){const R=6371000,dA=(a2-a1)*Math.PI/180,dO=(o2-o1)*Math.PI/180;const a=Math.sin(dA/2)**2+Math.cos(a1*Math.PI/180)*Math.cos(a2*Math.PI/180)*Math.sin(dO/2)**2;return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a))}

// Developing countries — higher mismanaged waste rates (World Bank lower/lower-middle income)
const DEV=new Set(["AF","AO","BD","BF","BI","BJ","CD","CF","CG","CI","CM","DJ","DZ","EG","ER","ET","GA","GH","GM","GN","GQ","GT","GW","GY","HN","HT","ID","IN","IQ","KE","KG","KH","KM","LA","LB","LK","LR","LS","LY","MA","MG","ML","MM","MN","MR","MW","MZ","NA","NE","NG","NI","NP","PG","PH","PK","PS","RW","SD","SL","SN","SO","SR","SS","SV","SY","SZ","TD","TG","TJ","TL","TM","TN","TO","TZ","UG","UZ","VN","VU","WS","YE","ZM","ZW"]);

function waterwayCapacity(stream){
  const ww=stream.waterway||'stream';
  const nCoords=stream.coords?.length||10;
  if(ww==='canal')return Math.max(5,Math.floor(nCoords/3));
  return Math.max(8,Math.floor(nCoords/2));
}

function generateCandidates(streams,pop,cc,seed){
  const R=seededRand(seed+7777);
  const isDev=DEV.has(cc),dev=isDev?1.4:1.0;

  // ── Spacing: SAME stream needs much wider gaps than cross-stream ──
  // If there's already a net on this stream, another 500m down is redundant
  // Cross-stream nets don't occlude each other — different catchments
  const SAME_STREAM_SPACE=500;   // 500m (~1600ft) along same waterway
  const CROSS_STREAM_SPACE=300;  // 300m (~1000ft) between different streams
  const MAX_W=30;

  // Upstream occlusion: each upstream net on the same stream reduces
  // the generation sub-score by this factor (compounds multiplicatively)
  const CATCH_EFFICIENCY=0.65;  // a net catches ~65% of debris passing through
  // So 1 net upstream → downstream sees 35% of original trash
  // 2 nets upstream → downstream sees 35% × 35% = 12%

  const RISK_PCTILE=pop>1e7?0.35:pop>1e6?0.30:pop>1e5?0.25:0.20;
  const MIN_DEPLOY=5;

  // ── Phase 1: Generate valid positions with wide spacing ──
  // SKIP underground segments — inject tunnel portals as high-priority
  const allPositions=[];
  const globalPlaced=[];
  let id=0;
  const PORTAL_BONUS=15;

  // Inject culvert entrance/exit portal points first
  const portals=streams._portals||[];
  for(const pt of portals){
    if(pt.estWidth>MAX_W)continue;
    let tooClose=false;
    for(const p of globalPlaced){if(hvM(p.a,p.o,pt.lat,pt.lon)<CROSS_STREAM_SPACE){tooClose=true;break}}
    if(tooClose)continue;
    globalPlaced.push({o:pt.lon,a:pt.lat});
    allPositions.push({id:id++,lon:pt.lon,lat:pt.lat,
      stream:pt.stream+' ('+pt.type+')',streamWidth:pt.estWidth,waterway:'culvert_portal',
      upstreamFrac:pt.type==='entrance'?0.95:0.05,order:3,streamIdx:-1,coordIdx:0,isPortal:true});
  }

  // Walk surface streams
  for(const st of streams){
    if(st.underground)continue;
    const w=st.estWidth||5;
    if(w>MAX_W)continue;
    const cap=waterwayCapacity(st);
    let countOnStream=0;
    let distAcc=SAME_STREAM_SPACE; // ready to place first

    for(let i=0;i<st.coords.length;i++){
      const[lon,lat]=st.coords[i];
      if(i>0){const[plo,pla]=st.coords[i-1];distAcc+=hvM(pla,plo,lat,lon)}
      if(distAcc<SAME_STREAM_SPACE)continue;

      // Cross-stream check (different streams still need some separation)
      let tooClose=false;
      for(const p of globalPlaced){if(hvM(p.a,p.o,lat,lon)<CROSS_STREAM_SPACE){tooClose=true;break}}
      if(tooClose)continue;
      if(countOnStream>=cap)continue;

      distAcc=0;
      countOnStream++;
      globalPlaced.push({o:lon,a:lat});

      allPositions.push({id:id++,lon,lat,stream:st.name,streamWidth:w,waterway:st.waterway||'stream',
        upstreamFrac:i/Math.max(1,st.coords.length-1),order:st.order,
        streamIdx:streams.indexOf(st),coordIdx:i});
    }
  }

  if(allPositions.length===0)return[];

  // ── Phase 2: Score every position (no occlusion yet — raw potential) ──
  const scored=allPositions.map(pos=>{
    const uf=pos.upstreamFrac,rg=()=>R()-.5;
    const popD=(800+uf*400)*dev+rg()*200;
    const imp=30+uf*15+rg()*8;
    const vel=.4+uf*.6+rg()*.15;
    const mq=(2+uf*25)*(isDev?1.5:1);
    const stO=Math.min(pos.order,Math.max(1,Math.round(1+uf*3.5)));
    const ca=.5+uf*45;
    const ej=Math.min(1,Math.max(0,.55+(isDev?.15:0)+rg()*.15));
    const ram=Math.max(20,300+rg()*150);
    const cw=Math.max(1,pos.streamWidth+rg()*2);
    const bs=Math.max(2,12+rg()*6);
    const bb=R()<.25?.2:0;
    const cl=v=>Math.max(0,Math.min(100,v));

    const gs=cl(popD/20*.18+imp*.4+5*2*.1);
    const fs=cl(mq*.8*.22+Math.min(vel*40,60)*.16+stO*12*.14+Math.min(ca*1.5,70)*.18);
    const ips=cl(R()*30*.22+R()*20*.16+ej*80*.18+(1-80/300)*80*.14);
    const ras=ram<200?1:ram<500?.8:ram<1000?.6:.3;
    const cws=cw<2?.5:cw<=15?1:cw<=30?.5:.2;
    const vf=vel<.05?.3:vel<.3?.7:vel<=1.5?1:vel<=2.5?.5:.1;
    const bss=bs<15?1:bs<30?.5:.2;
    const fes=cl((ras*.25+cws*.2+vf*.2+.5*.15+bss*.1+bb*.1)*100);
    const comp=cl(.3*gs+.25*fs+.3*ips+.15*fes+(pos.isPortal?PORTAL_BONUS:0));

    return{...pos,composite:+comp.toFixed(1),gen:+gs.toFixed(1),flow:+fs.toFixed(1),
      impact:+ips.toFixed(1),feas:+fes.toFixed(1),pop_d:+popD.toFixed(0),imp_pct:+imp.toFixed(1),
      vel:+vel.toFixed(2),mq:+mq.toFixed(1),strahler:stO,catch_km2:+ca.toFixed(1),
      ej:+ej.toFixed(2),road_m:+ram.toFixed(0),width_m:+cw.toFixed(1),slope_deg:+bs.toFixed(1),
      rawGen:gs};  // keep raw generation for occlusion
  });

  // ── Phase 3: Greedy selection with upstream occlusion ──
  // Instead of just taking top N%, we greedily pick the best site,
  // then discount downstream sites on the same stream, then pick next best.
  // This naturally spreads nets across different waterways.

  const pctCut=Math.ceil(scored.length*RISK_PCTILE);
  const targetCount=Math.max(MIN_DEPLOY,pctCut);
  const selected=[];
  const remaining=[...scored];
  // Track how many nets are upstream per stream
  const upstreamNets={}; // streamIdx → count of nets already placed upstream

  while(selected.length<targetCount&&remaining.length>0){
    // Sort remaining by current effective composite (accounts for occlusion)
    remaining.sort((a,b)=>b.composite-a.composite);

    // Pick the best remaining candidate
    const best=remaining.shift();
    selected.push(best);

    // Apply upstream occlusion: discount generation score for all DOWNSTREAM
    // candidates on the SAME stream
    const sIdx=best.streamIdx;
    upstreamNets[sIdx]=(upstreamNets[sIdx]||0)+1;
    const netsUp=upstreamNets[sIdx];

    for(const c of remaining){
      if(c.streamIdx===sIdx&&c.coordIdx>best.coordIdx){
        // This candidate is downstream of the net we just placed
        // Each upstream net lets through (1 - CATCH_EFFICIENCY) of trash
        const passthrough=Math.pow(1-CATCH_EFFICIENCY,netsUp);
        const discountedGen=+(c.rawGen*passthrough).toFixed(1);
        // Recompute composite with discounted generation
        c.gen=discountedGen;
        c.composite=+(.3*discountedGen+.25*c.flow+.3*c.impact+.15*c.feas).toFixed(1);
      }
    }
  }

  const nPortals=allPositions.filter(p=>p.isPortal).length;
  console.log(`Placement: ${allPositions.length} valid (${nPortals} portal) → ${scored.length} scored → greedy select ${selected.length} (target ${targetCount}, occlusion η=${CATCH_EFFICIENCY})`);
  pipelineStats={total:allPositions.length,scored:scored.length,deployed:selected.length,pctile:RISK_PCTILE,streams:streams.length,filtered:scored.length-selected.length,catchEff:CATCH_EFFICIENCY,portals:nPortals};
  return selected;
}

async function openCity(idx){
  if(idx<0||idx>=places.length)return;
  const p=places[idx];
  if(!p||!p.n)return;
  activeCityIdx=idx;selectedCand=null;
  clearLayers();

  // Show loading in sidebar
  document.getElementById('back-btn').classList.add('vis');
  document.getElementById('place-list').style.display='none';
  document.getElementById('sidebar-title').textContent=`${p.n||'Unknown'}, ${p.c||''}`;
  document.getElementById('city-view').classList.add('vis');
  document.getElementById('city-view').innerHTML='<div style="padding:20px;text-align:center;color:var(--td);font-family:var(--mono);font-size:12px"><div style="margin-bottom:8px">Fetching real rivers from OpenStreetMap...</div><div style="width:24px;height:24px;border:3px solid var(--bdr);border-top-color:var(--acc);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto"></div></div>';

  map.flyTo({center:[p.lo,p.la],zoom:14,pitch:20,duration:1500});

  // Fetch REAL waterway geometry from OSM
  const seed=Math.round(Math.abs(p.la*1000)+Math.abs(p.lo*1000)+p.p);
  activeStreams=await fetchRealStreams(p.la,p.lo,p.p);

  // No waterway data available for this location
  if(!activeStreams||activeStreams.length===0){
    activeCandidates=[];
    activeStreams=[];
    document.getElementById('info').textContent=`${p.n||'Unknown'} · No waterway data in OpenStreetMap`;
    document.getElementById('city-view').innerHTML=`
      <div style="padding:24px 16px;text-align:center">
        <div style="font-size:28px;margin-bottom:12px">🏜️</div>
        <div style="font-size:14px;font-weight:500;color:var(--t);margin-bottom:8px">No waterway data available</div>
        <div style="font-size:12px;color:var(--td);line-height:1.6">
          OpenStreetMap has no mapped rivers, streams, or canals within ${p.p>1e6?'8':'4–6'}km of ${p.n||'this location'}.<br><br>
          This can happen in arid regions, areas with poor OSM coverage, or generated township names that don't correspond to real settlements.<br><br>
          Try a nearby larger city, or use the Python pipeline with USGS DEM data for US locations.
        </div>
      </div>`;
    return;
  }

  activeCandidates=generateCandidates(activeStreams,p.p,p.c,seed);

  // Draw streams — surface solid cyan, underground dashed orange
  const streamGeo={type:'FeatureCollection',features:activeStreams.map(s=>({
    type:'Feature',geometry:{type:'LineString',coordinates:s.coords},
    properties:{name:s.name,order:s.order,underground:s.underground?1:0}
  }))};
  map.addSource('streams',{type:'geojson',data:streamGeo});
  map.addLayer({id:'streams-outline',type:'line',source:'streams',filter:['==',['get','underground'],0],paint:{'line-color':'#000','line-width':['interpolate',['linear'],['get','order'],1,4,4,7],'line-opacity':.4},layout:{'line-cap':'round','line-join':'round'}});
  map.addLayer({id:'streams',type:'line',source:'streams',filter:['==',['get','underground'],0],paint:{'line-color':'#00e5ff','line-width':['interpolate',['linear'],['get','order'],1,1.5,4,4],'line-opacity':.9},layout:{'line-cap':'round','line-join':'round'}});
  map.addLayer({id:'streams-underground',type:'line',source:'streams',filter:['==',['get','underground'],1],paint:{'line-color':'#f59e0b','line-width':2,'line-opacity':.6,'line-dasharray':[2,3]},layout:{'line-cap':'round','line-join':'round'}});
  map.addLayer({id:'stream-labels',type:'symbol',source:'streams',layout:{'symbol-placement':'line','text-field':['get','name'],'text-size':12,'text-font':['DIN Pro Medium','Arial Unicode MS Regular'],'text-offset':[0,-1],'text-allow-overlap':false},paint:{'text-color':'#fff','text-halo-color':'#000','text-halo-width':1.5}});

  // Draw candidates
  const candGeo={type:'FeatureCollection',features:activeCandidates.map((c,i)=>({
    type:'Feature',geometry:{type:'Point',coordinates:[c.lon,c.lat]},
    properties:{idx:i,composite:c.composite}
  }))};
  map.addSource('candidates',{type:'geojson',data:candGeo});
  map.addLayer({id:'cand-glow',type:'circle',source:'candidates',paint:{'circle-radius':['interpolate',['linear'],['get','composite'],20,12,55,22],'circle-color':['interpolate',['linear'],['get','composite'],20,'#ef4444',30,'#f59e0b',40,'#10b981',50,'#22d3ee'],'circle-opacity':.25,'circle-blur':1}});
  map.addLayer({id:'candidates',type:'circle',source:'candidates',paint:{'circle-radius':['interpolate',['linear'],['get','composite'],20,6,55,12],'circle-color':['interpolate',['linear'],['get','composite'],20,'#ef4444',30,'#f59e0b',40,'#10b981',50,'#22d3ee'],'circle-stroke-width':2.5,'circle-stroke-color':'#fff'}});
  map.on('click','candidates',e=>{selectCand(e.features[0].properties.idx)});
  map.on('mouseenter','candidates',()=>map.getCanvas().style.cursor='pointer');
  map.on('mouseleave','candidates',()=>map.getCanvas().style.cursor='');

  const nSurface=activeStreams.filter(s=>!s.underground).length;
  const nUnderground=activeStreams.filter(s=>s.underground).length;
  const nPortals=(activeStreams._portals||[]).length;
  const portalInfo=nUnderground>0?` · ${nUnderground} culverts · ${nPortals} portals`:'';
  document.getElementById('info').textContent=`${p.n||'Unknown'} · ${activeCandidates.length} nets · ${nSurface} surface rivers${portalInfo} · top ${pipelineStats?Math.round(pipelineStats.pctile*100):25}%`;
  renderCityView();
}

function selectCand(i){
  selectedCand=i;
  const c=activeCandidates[i];
  if(c)map.flyTo({center:[c.lon,c.lat],zoom:16,duration:600});
  renderCityView();
}

"Peru","PG":"Papua New Guinea","PH":"Philippines","PK":"Pakistan","PL":"Poland","PS":"Palestine","PT":"Portugal","PY":"Paraguay","QA":"Qatar","RO":"Romania","RS":"Serbia","RU":"Russia","RW":"Rwanda","SA":"Saudi Arabia","SB":"Solomon Is","SC":"Seychelles","SD":"Sudan","SE":"Sweden","SG":"Singapore","SI":"Slovenia","SK":"Slovakia","SL":"Sierra Leone","SM":"San Marino","SN":"Senegal","SO":"Somalia","SR":"Suriname","SS":"South Sudan","SV":"El Salvador","SY":"Syria","SZ":"Eswatini","TD":"Chad","TG":"Togo","TH":"Thailand","TJ":"Tajikistan","TL":"Timor-Leste","TM":"Turkmenistan","TN":"Tunisia","TO":"Tonga","TR":"Turkey","TT":"Trinidad","TW":"Taiwan","TZ":"Tanzania","UA":"Ukraine","UG":"Uganda","US":"United States","UY":"Uruguay","UZ":"Uzbekistan","VA":"Vatican","VC":"St Vincent","VE":"Venezuela","VN":"Vietnam","VU":"Vanuatu","WS":"Samoa","XK":"Kosovo","YE":"Yemen","ZA":"South Africa","ZM":"Zambia","ZW":"Zimbabwe"};
// Reverse lookup: "united states" → "US", "india" → "IN", etc.
const NAME_TO_CC={};
for(const[cc,name]of Object.entries(CC_NAMES)){NAME_TO_CC[name.toLowerCase()]=cc;NAME_TO_CC[cc.toLowerCase()]=cc}
// Country code → flag emoji (using Unicode regional indicator symbols)
const CC_FLAGS=Object.fromEntries(Object.keys(CC_NAMES).map(cc=>[cc,String.fromCodePoint(...[...cc].map(c=>0x1F1E6+c.charCodeAt(0)-65))]));

let searchTimeout=null;
function renderPlaceList(filter=''){
  const el=document.getElementById('place-list');
  const q=filter.trim();
  if(!q){
    // No search — show top 80 by population
    el.innerHTML=places.slice(0,80).map((p,i)=>{if(!p||!p.n)return'';return placeItem(i,p)}).join('');
    return;
  }

  const ql=q.toLowerCase();
  let cityQ=ql,countryQ='';

  // Support "city, country" syntax: "Springfield, IL" or "Mumbai, India"
  if(q.includes(',')){
    const parts=q.split(',').map(s=>s.trim().toLowerCase());
    cityQ=parts[0];
    countryQ=parts[1]||'';
  }

  // Resolve country query to code
  let countryCode=null;
  if(countryQ){
    countryCode=NAME_TO_CC[countryQ]||null;
    // Also try partial match: "unit" → "US" via "united states"
    if(!countryCode){
      for(const[name,cc]of Object.entries(NAME_TO_CC)){
        if(name.startsWith(countryQ)){countryCode=cc;break}
      }
    }
  }

  // Score and collect matches
  const results=[];
  for(let i=0;i<places.length&&results.length<150;i++){
    const p=places[i];
    if(!p||!p.n)continue;
    const nl=p.n.toLowerCase();
    const cName=(CC_NAMES[p.c]||'').toLowerCase();

    // If country filter specified, must match
    if(countryCode&&p.c!==countryCode)continue;

    // City name match
    let score=0;
    if(nl===cityQ)score=100;                         // exact match
    else if(nl.startsWith(cityQ))score=80;           // prefix match
    else if(nl.includes(cityQ))score=50;             // substring match
    else if(!countryQ){
      // Also match country name/code when no comma syntax
      if(p.c.toLowerCase()===ql)score=40;
      else if(cName.startsWith(ql))score=30;
      else if(cName.includes(ql))score=20;
      else continue;
    }else continue;

    // Boost by population (log scale) so big cities rank first among equal matches
    score+=Math.log10(Math.max(p.p,100))/10;
    results.push({idx:i,score});
  }

  // Sort by score desc, then pop desc
  results.sort((a,b)=>b.score-a.score||(places[b.idx].p-places[a.idx].p));
  const top=results.slice(0,100);

  const totalMatches=results.length;
  el.innerHTML=`<div style="padding:6px 18px;font-size:11px;color:var(--td);font-family:var(--mono)">${top.length<totalMatches?`Top ${top.length} of ${totalMatches.toLocaleString()}`:`${totalMatches}`} matches</div>`+
    top.map(r=>placeItem(r.idx,places[r.idx])).join('');
}

function placeItem(idx,p){
  const cName=CC_NAMES[p.c]||p.c;
  const popStr=p.p>1e6?(p.p/1e6).toFixed(1)+'M':p.p>1e3?(p.p/1e3).toFixed(0)+'K':p.p;
  return`<div class="pl-item" onclick="openCity(${idx})">
    <span class="pl-cc">${CC_FLAGS[p.c]||'🌍'}</span>
    <div style="flex:1;overflow:hidden"><div class="pl-name">${p.n}</div><div style="font-size:10px;color:var(--td)">${cName}</div></div>
    <span class="pl-pop">${popStr}</span>
  </div>`;
}

// Score → color (matches map layer color ramp)
function sc(v){return v>=50?'#22d3ee':v>=40?'#10b981':v>=30?'#f59e0b':'#ef4444'}

  if(pipelineStats){
    html+=`<div style="font-size:10px;color:var(--td);font-family:var(--mono);margin-bottom:12px;line-height:1.6">
      ${pipelineStats.scored} evaluated → ${pipelineStats.deployed} deployed (top ${Math.round(pipelineStats.pctile*100)}%)<br>
      ${pipelineStats.filtered} filtered · ${Math.round((pipelineStats.catchEff||.65)*100)}% catch rate · occlusion active${pipelineStats.portals?` · ${pipelineStats.portals} culvert portals`:''}
    </div>`;
  }

  html+=activeCandidates.slice(0,25).map((c,i)=>{
    const rc=i===0?'r1':i===1?'r2':i===2?'r3':'';

    return`<div class="cand-item ${act}" onclick="selectCand(${i})">

      <div style="font-family:var(--mono);font-size:14px;font-weight:700;text-align:right;color:${sc(c.composite)}">${c.composite}</div>
    </div>`;
  }).join('');

  if(selectedCand!==null&&activeCandidates[selectedCand]){
    const c=activeCandidates[selectedCand];
    const ss=[{l:'Generation',v:c.gen,c:'var(--gen)',w:'30%'},{l:'Flow',v:c.flow,c:'var(--flow)',w:'25%'},{l:'Impact',v:c.impact,c:'var(--imp)',w:'30%'},{l:'Feasibility',v:c.feas,c:'var(--feas)',w:'15%'}];
    html+=`<div style="margin-top:14px;padding-top:14px;border-top:1px solid var(--bdr)">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">
        <div><div style="font-size:10px;text-transform:uppercase;letter-spacing:1px;color:var(--td)">Score</div>
        <div style="font-family:var(--mono);font-size:28px;font-weight:700;color:var(--acc)">${c.composite}</div></div>
        <button class="close" onclick="selectedCand=null;renderCityView()">×</button>
      </div>
      ${ss.map(s=>`<div class="ss-row"><div style="font-size:11px;font-weight:500;color:${s.c}">${s.l} <span style="font-size:9px;color:var(--td)">${s.w}</span></div><div class="ss-bar"><div class="ss-fill" style="width:${s.v}%;background:${s.c}"></div></div><div style="font-family:var(--mono);font-size:11px;text-align:right">${s.v}</div></div>`).join('')}
      <div class="pgrid">
        ${[['Pop',c.pop_d+'/km²'],['Imperv',c.imp_pct+'%'],['Velocity',c.vel+' m/s'],['Mean Q',c.mq+' cfs'],['Strahler',c.strahler],['Catchment',c.catch_km2+' km²'],['EJ Index',c.ej],['Road',c.road_m+'m'],['Width',c.width_m+'m'],['Slope',c.slope_deg+'°'],['Waterway',c.waterway==='culvert_portal'?'⚠ Culvert portal':(c.waterway||'stream')],['Site type',c.isPortal?'Tunnel entrance':'Surface']].map(([l,v])=>`<div class="pchip"><div class="pchip-l">${l}</div><div class="pchip-v">${v}</div></div>`).join('')}
      </div>
    </div>`;
  }
  el.innerHTML=html;
}

// ── Satellite: on/off overlay (independent of theme) ──
document.getElementById('style-toggle').addEventListener('click',()=>{
  isSat=!isSat;
  document.getElementById('style-toggle').textContent=isSat?'Satellite ✓':'Satellite';
  document.getElementById('style-toggle').classList.toggle('active',isSat);
  reloadMap();
});

// ── Waterway overlay: OSM tiles showing real rivers ──
let wwOverlayOn=false;
function addWaterwayOverlay(){
  if(map.getSource('osm-ww'))return;
  map.addSource('osm-ww',{type:'raster',tiles:['https://tile.openstreetmap.org/{z}/{x}/{y}.png'],tileSize:256,attribution:'© OpenStreetMap'});
  map.addLayer({id:'osm-ww-layer',type:'raster',source:'osm-ww',paint:{'raster-opacity':0.35}},
    map.getLayer('streams-outline')?'streams-outline':map.getLayer('clusters')?'clusters':undefined);
}
function removeWaterwayOverlay(){
  try{map.removeLayer('osm-ww-layer')}catch(e){}
  try{map.removeSource('osm-ww')}catch(e){}
}

document.getElementById('ww-toggle').addEventListener('click',()=>{
  wwOverlayOn=!wwOverlayOn;
  const btn=document.getElementById('ww-toggle');
  btn.classList.toggle('active',wwOverlayOn);
  if(wwOverlayOn)addWaterwayOverlay();else removeWaterwayOverlay();
});

// ── Theme: dark ↔ light (switches BOTH UI chrome and earth map) ──
let isLightTheme=true;
document.getElementById('theme-toggle').addEventListener('click',()=>{
  isLightTheme=!isLightTheme;
  document.body.classList.toggle('theme-light',isLightTheme);
  document.getElementById('theme-toggle').textContent=isLightTheme?'Dark theme':'Light theme';
  reloadMap(); // always switch map to match — dark earth or light earth (unless satellite is on, then no change needed)
});

// ═══ INIT (entry point called at top of script) ═════════════════

</script>
